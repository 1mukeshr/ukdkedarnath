  <main id="main-content" class="form-page" tabindex="-1">
    <div class="container">
      <div class="form-card" style="max-width: 480px;">
        <h1 style="font-size: 1.75rem; margin-bottom: 8px;">Download Membership Card</h1>
        <p style="color: var(--color-text-muted); margin-bottom: 24px;">Enter your details to generate and download your UKD Kedarnath membership card.</p>

        <div class="form-group">
          <label>Full Name <span class="required">*</span></label>
          <input type="text" id="cardName" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Member ID (optional)</label>
          <input type="text" id="memberId" placeholder="e.g. UKD-2026-001">
        </div>
        <div class="form-group">
          <label>Profile Photo (optional)</label>
          <input type="file" id="cardPhoto" accept="image/*">
        </div>

        <div class="preview-area" id="cardPreview" style="max-width: 340px; aspect-ratio: 2/1.2; background: linear-gradient(135deg, #1a2520 0%, #0d1a14 100%); border: 2px solid rgba(34,197,94,0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;">
          <div style="font-size: 2rem; font-weight: 800; color: #22c55e; margin-bottom: 8px;">U</div>
          <div id="cardPreviewName" style="font-family: var(--font-heading); font-weight: 700; color: #fff; font-size: 1.1rem;">Your Name</div>
          <div id="cardPreviewId" style="font-size: 0.85rem; color: var(--color-text-muted);">Member • UKD Kedarnath</div>
        </div>

        <div class="download-actions">
          <button type="button" class="btn btn-primary" id="downloadCardBtn">Download Card</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function() {
      var cardName = document.getElementById('cardName');
      var memberId = document.getElementById('memberId');
      var cardPhoto = document.getElementById('cardPhoto');
      var cardPreview = document.getElementById('cardPreview');
      var cardPreviewName = document.getElementById('cardPreviewName');
      var cardPreviewId = document.getElementById('cardPreviewId');
      var downloadCardBtn = document.getElementById('downloadCardBtn');
      var photoDataUrl = null;

      function updateCardPreview() {
        cardPreviewName.textContent = cardName.value || 'Your Name';
        cardPreviewId.textContent = (memberId.value ? memberId.value + ' • ' : '') + 'UKD Kedarnath';
      }

      cardName.addEventListener('input', updateCardPreview);
      memberId.addEventListener('input', updateCardPreview);

      cardPhoto.addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
          photoDataUrl = ev.target.result;
        };
        reader.readAsDataURL(file);
      });

      downloadCardBtn.addEventListener('click', function() {
        var name = cardName.value || 'Member';
        var id = memberId.value || 'UKD Kedarnath';
        var canvas = document.createElement('canvas');
        canvas.width = 400;
        canvas.height = 240;
        var ctx = canvas.getContext('2d');

        var gradient = ctx.createLinearGradient(0, 0, 400, 240);
        gradient.addColorStop(0, '#1a2520');
        gradient.addColorStop(1, '#0d1a14');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 400, 240);

        ctx.strokeStyle = 'rgba(34, 197, 94, 0.4)';
        ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, 396, 236);

        ctx.fillStyle = '#22c55e';
        ctx.font = 'bold 48px Outfit, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('U', 50, 100);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 22px Outfit, sans-serif';
        ctx.fillText(name, 200, 100);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '14px DM Sans, sans-serif';
        ctx.fillText(id + ' • Yuva Uttarakhand', 200, 130);

        ctx.fillStyle = '#22c55e';
        ctx.font = '11px DM Sans, sans-serif';
        ctx.fillText('Voice of youth, strength of mountains', 200, 220);

        var link = document.createElement('a');
        link.download = 'ukd-kedarnath-membership-card.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    })();
  </script>
